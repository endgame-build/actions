name: 'tome-comments setup'
description: 'Shared preamble for process-tome-comments jobs: mint App token, checkout consumer + actions repos.'

inputs:
  app-id:
    description: 'tome-comments[bot] App ID'
    required: true
  app-private-key:
    description: 'tome-comments[bot] App private key (PEM)'
    required: true
  actions-ref:
    description: 'Ref of endgame-build/actions to sparse-checkout. Defaults to github.action_ref.'
    required: false
    default: ''

outputs:
  app-token:
    description: 'Installation token minted for tome-comments[bot]'
    value: ${{ steps.app-token.outputs.token }}
  app-slug:
    description: 'App slug (used to derive bot login)'
    value: ${{ steps.app-token.outputs.app-slug }}

runs:
  using: 'composite'
  steps:
    - name: Mint App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    - name: Checkout consumer repo (App token)
      uses: actions/checkout@v4
      with:
        token: ${{ steps.app-token.outputs.token }}
        fetch-depth: 1

    - name: Checkout actions repo (sparse)
      uses: actions/checkout@v4
      with:
        repository: endgame-build/actions
        path: .actions
        ref: ${{ inputs.actions-ref || github.action_ref || 'main' }}
        sparse-checkout: |
          process-tome-comments
