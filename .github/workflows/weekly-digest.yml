name: Weekly Changelog Digest

on:
  schedule:
    - cron: "0 9 * * 1"  # Monday 9:00 UTC
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      REPOS: "endgame-build/atelier endgame-build/jira-cli endgame-build/toc-flow"
    steps:
      - name: Collect changelogs
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN }}
        run: |
          gh api repos/endgame-build/actions/contents/scripts/collect-digest.sh \
            -H "Accept: application/vnd.github.raw" > /tmp/collect-digest.sh
          digest=$(bash /tmp/collect-digest.sh)
          if [ -z "$digest" ]; then
            echo "DIGEST_EMPTY=true" >> "$GITHUB_ENV"
          else
            echo "$digest" > /tmp/digest.txt
            echo "DIGEST_EMPTY=false" >> "$GITHUB_ENV"
          fi

      - name: Build Slack payload
        if: env.DIGEST_EMPTY == 'false'
        env:
          SLACK_CHANNEL: ${{ vars.SLACK_PUBLIC_CHANNEL_ID }}
        run: |
          [ -z "$SLACK_CHANNEL" ] && echo "No channel ID — skipping." && exit 0
          jq -n --arg channel "$SLACK_CHANNEL" \
            --arg text "*Weekly Changelog Digest*

          $(cat /tmp/digest.txt)" \
            '{ channel: $channel, text: $text }' > /tmp/digest-payload.json

      - name: Post to Slack
        if: env.DIGEST_EMPTY == 'false'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-file-path: /tmp/digest-payload.json
